## FEATURES (v1.0)
### Core Mechanic: Kano Dual-Question Method
- 8 political topics, each with positive + negative framing question
- 5 answer options per question (Begeistert, Erwarte ich, Egal, Akzeptabel, Stoert mich)
- Kano matrix maps positive+negative answer pair to category: Begeisterung, Leistung, Basis, Indifferent, Rueckweisung, Fraglich
- Per-topic classification shown as coloured pills on results screen
- Per-candidate summary: how many of their topics fall into each Kano category

### Topics (8)
1. Wohnen (Krause-leaning): 50.000 neue bezahlbare Wohnungen, SEM Nord, Umwandlungsagentur
2. OEPNV & Mobilitaet (Krause-leaning): Tramlinien ausbauen vor Gratisticket
3. Verkehr & Strassenraum (Krause-leaning): Autoverkehr zugunsten Fuss/Rad zurueckbauen
4. Klima & Energie (Krause-leaning): Klimaneutral 2035, PV auf staedtischen Daechern
5. Sicherheit & Ordnung (Both): Polizeipraesenz + Sozialarbeit + Praevention
6. Digitale Verwaltung (Reiter-leaning): Alle Behoerdengaenge digital, Muenchen-App
7. Kultur & Subkultur (Krause-leaning): Subkultur schuetzen, Zwischennutzung, bezahlbare Ateliers
8. Amtserfahrung & Kontinuitaet (Reiter-leaning): OB der den Laden kennt

### Design
- Single file, standalone HTML
- Alpine.js via vendor/alpine.min.js (deferred)
- Tailwind via shared styles.css
- Fortress Zero: no backend, no cookies, no tracking, no CDN
- Non-partisan colours: indigo-500 / teal-500 for candidates (NOT party colours)
- Candidate order randomised per session (primacy bias prevention)
- No celebratory framing
- Mobile-first (375px), max-w-lg centred
- Inter font family

### Flow
1. Intro screen: Kano concept explained simply, Stichwahl badge, CTA
2. Questions: 8 topic cards, each with 2 sub-questions (positive + negative), radio buttons, progress
3. Results: Kano pills per topic, candidate summary, asymmetry insight, key insight text
4. Share: clipboard fallback, cross-nav to other tools + index.html

<script>

    ['F', 'R', 'R', 'R', 'R'],  // neg: begeistert
    ['B', 'I', 'I', 'I', 'R'],  // neg: erwarte ich

    ['B', 'I', 'I', 'I', 'R'],  // neg: akzeptabel
    ['B', 'L', 'A', 'A', 'F'],  // neg: stoert mich
  ];

  const KANO_LABELS = {
    B: 'Begeisterung', L: 'Leistung', A: 'Basis',
    I: 'Indifferent', R: 'Rückweisung', F: 'Fraglich'

      negQ: 'Wie fändest du es, wenn der nächste OB bei Sicherheit und Ordnung keine neuen Akzente setzt?',
      explainers: {
        B: 'Die Kombination aus Sicherheit und Prävention begeistert dich. Beide Kandidaten versprechen das, unterschiedlich akzentuiert.',
        L: 'Je besser die Sicherheitslage, desto zufriedener bist du. Hier belohnst du konkrete Ergebnisse.',
        A: 'Sicherheit ist Pflicht. Wenn der OB hier nicht liefert, hilft alles andere nicht. Beide Kandidaten betonen das Thema.',
        I: 'Sicherheit und Ordnung stehen bei dir nicht im Vordergrund. Das Thema macht für dich keinen Unterschied.',
        R: 'Du lehnst mehr Polizeipräsenz ab, auch mit Sozialarbeit kombiniert.',
        F: 'Deine Antworten sind uneindeutig. Vielleicht hängt es für dich vom konkreten Ansatz ab.'
      }
    },
    {
      label: 'Digitale Verwaltung',
      emoji: '\u{1F4F1}',
      desc: 'Online-Behördengänge, München-App',
      leaning: 'Schwerpunkt: Reiter',
      candidateId: 'reiter',
      posQ: 'Wie fändest du es, wenn der nächste OB alle Behördengänge digital ermöglicht und eine München-App für alles einführt?',
      negQ: 'Wie fändest du es, wenn Behördengänge weiterhin Wartezeit und persönliches Erscheinen erfordern?',
      explainers: {
        B: 'Digitale Verwaltung begeistert dich. Reiter hat hier ein laufendes Digitalisierungsprogramm, das auf seiner Erfahrung aufbaut.',
        L: 'Je digitaler die Verwaltung, desto besser. Du belohnst jeden Fortschritt in diese Richtung.',
        A: 'Digitale Behördengänge sind für dich selbstverständlich. Ohne sie verliert der OB bei dir Vertrauen.',
        I: 'Digitalisierung der Verwaltung ist dir nicht besonders wichtig. Du kommst auch mit dem Status quo zurecht.',
        R: 'Du willst keine vollständige Digitalisierung der Behörden. Vielleicht schätzt du persönlichen Kontakt.',
        F: 'Deine Antworten passen nicht zusammen. Vielleicht willst du beides: digital und persönlich.'
      }
    },
    {
      label: 'Kultur & Subkultur',
      emoji: '\u{1F3A8}',
      desc: 'Subkulturschutz, Zwischennutzung, Ateliers',
      leaning: 'Schwerpunkt: Krause',
      candidateId: 'krause',
      posQ: 'Wie fändest du es, wenn der nächste OB Subkultur aktiv schützt, Zwischennutzung fördert und bezahlbare Ateliers sichert?',
      negQ: 'Wie fändest du es, wenn der nächste OB Kulturförderung dem Markt überlässt und keine Räume für Subkultur schafft?',
      explainers: {
        B: 'Subkulturschutz begeistert dich. Krause hat sich konkret für das Backstage eingesetzt und Zwischennutzung des alten Gasteigs ermöglicht.',
        L: 'Je mehr für Kultur passiert, desto besser. Du belohnst jeden Schritt, den der OB hier geht.',
        A: 'Kulturförderung ist für dich Grunderwartung. Ohne sie fehlt München etwas Wesentliches.',
        I: 'Subkultur und Ateliers sind dir nicht besonders wichtig. Das Thema beeinflusst deine Wahl kaum.',
        R: 'Du lehnst aktive Subkulturförderung ab. Vielleicht findest du, dass Kultur sich selbst tragen sollte.',
        F: 'Deine Antworten sind widersprüchlich. Vielleicht unterstützt du Kultur, aber nicht durch städtische Eingriffe.'
      }
    },
    {
      label: 'Amtserfahrung & Kontinuität',
      emoji: '\u{1F3DB}\u{FE0F}',
      desc: 'Verwaltungskompetenz, gewachsene Netzwerke',
      leaning: 'Schwerpunkt: Reiter',
      candidateId: 'reiter',
      posQ: 'Wie fändest du es, wenn der nächste OB die Verwaltung seit Jahren kennt, ein eingespieltes Netzwerk hat und sofort loslegen kann?',
      negQ: 'Wie fändest du es, wenn der nächste OB erst in die Rolle hineinwachsen muss und die internen Abläufe neu lernt?',
      explainers: {
        B: 'Erfahrung begeistert dich. Reiter hat 12 Jahre Amtserfahrung, das ist sein stärkstes Argument.',
        L: 'Je mehr Verwaltungskompetenz, desto besser. Du schätzt, dass jemand weiß wie der Laden läuft.',
        A: 'Amtserfahrung ist für dich Pflicht. Ohne sie traust du keinem OB zu, die großen Themen zu bewegen. Das spricht klar für Reiter.',
        I: 'Ob der OB Erfahrung mitbringt oder nicht, ist dir egal. Du schaust auf die Inhalte, nicht den Lebenslauf.',
        R: 'Du willst ausdrücklich keinen Amtsinhaber-Bonus. Für dich ist es Zeit für jemand Neues.',
        F: 'Deine Antworten sind widersprüchlich. Vielleicht schätzt du Erfahrung, willst aber trotzdem Veränderung.'
      }
    }
  ];

  const ANSWER_OPTIONS = [
    'Das würde mich begeistern',
    'Das erwarte ich',
    'Ist mir egal',
    'Kann ich gerade noch akzeptieren',
    'Das würde mich stören'
  ];

  // Randomise candidate display order
  const CANDIDATES = [
    { id: 'krause', name: 'Krause (Grüne)' },
    { id: 'reiter', name: 'Reiter (SPD)' }
  ];
  const shuffled = Math.random() < 0.5 ? [CANDIDATES[0], CANDIDATES[1]] : [CANDIDATES[1], CANDIDATES[0]];

  return {
    screen: 'intro',
    currentTopic: 0,
    answers: Array.from({ length: 8 }, () => ({ pos: null, neg: null })),
    topics: TOPICS,
    answerOptions: ANSWER_OPTIONS,
    candidateOrder: shuffled,
    copied: false,

    get progressPct() {
      if (this.screen === 'intro') return 0;
      if (this.screen === 'questions') {
        const answered = this.answers.reduce((sum, a) => sum + (a.pos !== null ? 0.5 : 0) + (a.neg !== null ? 0.5 : 0), 0);
        return 5 + (answered / 8) * 85;
      }
      return 100;
    },

    get canAdvance() {
      const a = this.answers[this.currentTopic];
      return a && a.pos !== null && a.neg !== null;
    },

    setAnswer(type, idx) {
      this.answers[this.currentTopic][type] = idx;
    },

    nextTopic() {
      if (!this.canAdvance) return;
      if (this.currentTopic >= 7) {
        this.screen = 'results';
      } else {
        this.currentTopic++;
      }
    },

    getKanoCode(topicIdx) {
      const a = this.answers[topicIdx];
      if (a.pos === null || a.neg === null) return 'I';
      return KANO_MATRIX[a.neg][a.pos];
    },

    getKanoKey(topicIdx) {
      return KANO_KEYS[this.getKanoCode(topicIdx)];
    },

    getKanoLabel(topicIdx) {
      return KANO_LABELS[this.getKanoCode(topicIdx)];
    },

    getKanoExplainer(topicIdx) {
      const code = this.getKanoCode(topicIdx);
      const key = KANO_KEYS[code];
      return TOPICS[topicIdx].explainers[code] || '';
    },

    get kanoSummaryOrder() {
      const counts = { begeisterung: 0, leistung: 0, basis: 0, indifferent: 0, rueckweisung: 0, fraglich: 0 };
      for (let i = 0; i < 8; i++) {
        counts[this.getKanoKey(i)]++;
      }
      return [
        { key: 'begeisterung', label: 'Begeisterung', count: counts.begeisterung },
        { key: 'leistung', label: 'Leistung', count: counts.leistung },
        { key: 'basis', label: 'Basis', count: counts.basis },
        { key: 'indifferent', label: 'Indifferent', count: counts.indifferent },
        { key: 'rueckweisung', label: 'Rückweisung', count: counts.rueckweisung },
        { key: 'fraglich', label: 'Fraglich', count: counts.fraglich }
      ];
    },

    getCandidateKano(candidateId) {
      const result = [];
      for (let i = 0; i < 8; i++) {
        const t = TOPICS[i];
        if (t.candidateId === candidateId || t.candidateId === 'both') {
          result.push({
            topic: i,
            topicLabel: t.label,
            kano: this.getKanoKey(i)
          });
        }
      }
      return result;
    },

    get asymmetryInsight() {
      // Count Begeisterung/Basis per candidate
      const krauseTopics = [0, 1, 2, 3, 6]; // Wohnen, OEPNV, Verkehr, Klima, Kultur
      const reiterTopics = [5, 7]; // Digital, Amtserfahrung
      const bothTopics = [4]; // Sicherheit

      let krauseBegeisterung = 0, krauseBasis = 0, krauseLeistung = 0;
      let reiterBegeisterung = 0, reiterBasis = 0, reiterLeistung = 0;

      for (const i of krauseTopics) {
        const code = this.getKanoCode(i);
        if (code === 'B') krauseBegeisterung++;
        if (code === 'A') krauseBasis++;
        if (code === 'L') krauseLeistung++;
      }
      for (const i of reiterTopics) {
        const code = this.getKanoCode(i);
        if (code === 'B') reiterBegeisterung++;
        if (code === 'A') reiterBasis++;
        if (code === 'L') reiterLeistung++;
      }

      const parts = [];

      if (krauseBegeisterung > 0) {
        parts.push('<strong>' + krauseBegeisterung + ' von Krauses Themen</strong> begeistern dich');
      }
      if (reiterBasis > 0) {
        parts.push('bei Reiters Themen erwartest du <strong>' + reiterBasis + '× Basis-Leistung</strong>, die du voraussetzt');
      }
      if (reiterBegeisterung > 0 && krauseBegeisterung === 0) {
        parts.push('<strong>' + reiterBegeisterung + ' von Reiters Themen</strong> begeistern dich');
      }

      if (parts.length === 0) {
        return 'Dein Profil zeigt keine starke Asymmetrie zwischen den Kandidaten. Beide haben Themen, die dir wichtig sind, und Themen, die dich weniger interessieren.';
      }

      let text = parts.join(', ');
      text = text.charAt(0).toUpperCase() + text.slice(1) + '.';

      // Add the key asymmetry observation
      if (reiterBasis > 0 && krauseBegeisterung > 0) {
        text += ' <strong>Das heißt:</strong> Krauses Themen können dich positiv überraschen. Reiters Themen sind Pflicht, die du erwartest. Wenn Pflicht wichtiger ist als Begeisterung, spricht das für Reiter. Wenn du Aufbruch willst, spricht das für Krause.';
      }

      return text;
    },

    get keyInsight() {
      const basisCount = this.kanoSummaryOrder.find(c => c.key === 'basis')?.count || 0;
      const begeisterungCount = this.kanoSummaryOrder.find(c => c.key === 'begeisterung')?.count || 0;
      const rueckweisungCount = this.kanoSummaryOrder.find(c => c.key === 'rueckweisung')?.count || 0;

      if (basisCount >= 4) {
        return '<strong>Viele Basis-Themen:</strong> Du hast hohe Grunderwartungen. Wer die nicht erfüllt, fällt bei dir durch, egal was er sonst verspricht. Kein OB kann dich begeistern, bevor die Basics stimmen.';
      }
      if (begeisterungCount >= 4) {
        return '<strong>Viele Begeisterungs-Themen:</strong> Du bist offen für Neues und belohnst ambitionierte Versprechen. Aber Vorsicht: Begeisterung heißt auch, dass du enttäuscht wirst, wenn nichts davon kommt.';
      }
      if (rueckweisungCount >= 3) {
        return '<strong>Mehrere Rückweisungen:</strong> Bei einigen Themen lehnst du die vorgeschlagene Richtung ab. Das ist ein klares Signal, dass du bei diesen Punkten anders denkst als der jeweilige Kandidat.';
      }
      return '<strong>Gemischtes Profil:</strong> Du hast Grunderwartungen, Begeisterungspotenzial und Themen, die dich kalt lassen. Das ist normal. Entscheidend ist, welche Basis-Themen für dich den Ausschlag geben.';
    },

    get shareText() {
      // Find which candidate has more Begeisterung+Leistung topics
      const krauseTopics = [0, 1, 2, 3, 6];
      const reiterTopics = [5, 7];
      let krauseHot = [], reiterHot = [];
      for (const i of krauseTopics) {
        const c = this.getKanoCode(i);
        if (c === 'B' || c === 'L') krauseHot.push(this.topics[i].label);
      }
      for (const i of reiterTopics) {
        const c = this.getKanoCode(i);
        if (c === 'B' || c === 'L') reiterHot.push(this.topics[i].label);
      }
      // Build text around the stronger match
      const stronger = krauseHot.length >= reiterHot.length ? 'Krause' : 'Reiter';
      const hotTopics = stronger === 'Krause' ? krauseHot : reiterHot;
      if (hotTopics.length === 0) {
        return 'Mein Prioritäten-Check: Keiner der Kandidaten trifft meine Kernthemen. Und bei dir? mucwahl.de/stichwahl4';
      }
      return 'Mein Prioritäten-Check: Bei ' + hotTopics.join(', ') + ' bin ich nah bei ' + stronger + '. Und du? mucwahl.de/stichwahl4';
    },

    async copyShare() {
      try {
        await navigator.clipboard.writeText(this.shareText);
        this.copied = true;
        setTimeout(() => this.copied = false, 2000);
      } catch(e) {}
    },

    restart() {
      this.screen = 'intro';
      this.currentTopic = 0;
      this.answers = Array.from({ length: 8 }, () => ({ pos: null, neg: null }));
      this.copied = false;
    }
  };
}
</script>
